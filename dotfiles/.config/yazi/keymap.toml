# rsync-paste.yazi
[[mgr.prepend_keymap]]
on   = [ "c", "r" ]
run  = "plugin rsync-paste"
desc = "Rsync paste (auto: y=incremental / x=move)"

[[mgr.prepend_keymap]]
on   = [ "c", "r", "r" ]
run  = "plugin rsync-paste -i"
desc = "Rsync paste (incremental, explicit)"

[[mgr.prepend_keymap]]
on   = [ "c", "r", "a" ]
run  = "plugin rsync-paste -o"
desc = "Rsync paste (overwrite, source priority)"

[[mgr.prepend_keymap]]
on   = [ "c", "r", "x" ]
run  = "plugin rsync-paste -m"
desc = "Rsync paste (move, remove source)"

# 常用目录

[[mgr.prepend_keymap]]
on   = [ "g", "r" ]
run  = "cd /run/media/syaofox"
desc = "Go to /run/media/syaofox"

[[mgr.prepend_keymap]]
on   = [ "g", "t" ]
run  = "cd ~/tmp"
desc = "Go to ~/tmp"

[[mgr.prepend_keymap]]
on   = [ "g", "p" ]
run  = "cd ~/Projects"
desc = "Go to ~/Projects"

[[mgr.prepend_keymap]]
on   = [ "g", "m" ]
run  = "cd /mnt"
desc = "Go to mnt"

[[mgr.prepend_keymap]]
on   = [ "g", "r" ]
run  = "cd ~/.local/share/Trash/files"
desc = "Go to trash"

# mv-dir.yazi - Move selected files to new directory
[[mgr.prepend_keymap]]
on   = [ "c", "d" ]
run  = "plugin mv-dir"
desc = "Move selected files to new directory"

# compress.yazi - Archive selected files
[[mgr.prepend_keymap]]
on   = [ "c", "a", "a" ]
run  = "plugin compress"
desc = "Archive selected files"

[[mgr.prepend_keymap]]
on   = [ "c", "a", "p" ]
run  = "plugin compress -p"
desc = "Archive selected files (password)"

[[mgr.prepend_keymap]]
on   = [ "c", "a", "h" ]
run  = "plugin compress -ph"
desc = "Archive selected files (password+header)"

[[mgr.prepend_keymap]]
on   = [ "c", "a", "l" ]
run  = "plugin compress -l"
desc = "Archive selected files (compression level)"

[[mgr.prepend_keymap]]
on   = [ "c", "a", "u" ]
run  = "plugin compress -phl"
desc = "Archive selected files (password+header+level)"

[[mgr.prepend_keymap]]
on   = [ "c", "m" ]
run  = "plugin chmod"
desc = "Chmod on selected files"